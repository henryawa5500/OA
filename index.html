<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Video Overlay AR</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        #tapToStartOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            flex-direction: column;
            transition: opacity 0.3s;
        }

        #tapToStartOverlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            #tapToStartOverlay {
                font-size: 1.2rem;
            }
        }
    </style>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.7/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <div id="tapToStartOverlay">
        <div>Tap to Start</div>
        <div style="font-size:1rem;margin-top:1em;">(Enable camera & audio)</div>
    </div>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: yes;" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false" embedded
        renderer="colorManagement: true, physicallyCorrectLights: true" style="width: 100vw; height: 100vh;">
        <a-assets>
            <video id="arvideo" src="OA_CIA_Animation.mp4" preload="auto" crossorigin="anonymous" playsinline
                webkit-playsinline></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video id="video-plane" src="#arvideo" width="1" height="0.5625" position="0 0 0" rotation="0 0 0"
                visible="false">
            </a-video>
        </a-entity>
    </a-scene>
    <script>
        const overlay = document.getElementById('tapToStartOverlay');
        const scene = document.querySelector('a-scene');
        const mindarComponent = scene.components['mindar-image'];
        const video = document.getElementById('arvideo');
        const videoPlane = document.getElementById('video-plane');
        let detected = false;
        let playTimeout = null;

        // Unlock video/audio on mobile
        function unlockVideoAudio() {
            video.muted = false;
            video.play().catch(() => { });
            video.pause();
        }

        overlay.addEventListener('click', () => {
            unlockVideoAudio();
            overlay.classList.add('hide');
            setTimeout(() => overlay.style.display = 'none', 400);
            mindarComponent.start();
        });

        // MindAR events
        scene.addEventListener('targetFound', () => {
            if (detected) return;
            detected = true;
            playTimeout = setTimeout(() => {
                video.currentTime = 0;
                video.muted = false;
                video.play().catch(() => { });
                videoPlane.setAttribute('visible', 'true');
            }, 2000);
        });
        scene.addEventListener('targetLost', () => {
            detected = false;
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }
            video.pause();
            video.currentTime = 0;
            videoPlane.setAttribute('visible', 'false');
        });

        // Prevent video from pausing if not in AR
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                video.pause();
                video.currentTime = 0;
                videoPlane.setAttribute('visible', 'false');
            }
        });
    </script>
</body>

</html>
